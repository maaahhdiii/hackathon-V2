version: '3.8'

networks:
  battle-net:
    driver: bridge
  management-net:
    driver: bridge

x-team-web: &team-web
  build: ../team-stack/web-server
  networks: [battle-net, management-net]
  environment:
    - HACKATHON_SECRET=HACKATHON_SECRET_2025
  restart: unless-stopped

x-team-api: &team-api
  build: ../team-stack/api-server
  networks: [battle-net, management-net]
  environment:
    - HACKATHON_SECRET=HACKATHON_SECRET_2025
  restart: unless-stopped

x-team-file: &team-file
  build: ../team-stack/file-server
  networks: [battle-net, management-net]
  environment:
    - HACKATHON_SECRET=HACKATHON_SECRET_2025
  restart: unless-stopped

x-team-db: &team-db
  build: ../team-stack/db-server
  networks: [battle-net, management-net]
  environment:
    - HACKATHON_SECRET=HACKATHON_SECRET_2025
  restart: unless-stopped

services:
  team1-web: { <<: *team-web, container_name: team1-web }
  team1-api: { <<: *team-api, container_name: team1-api }
  team1-file: { <<: *team-file, container_name: team1-file }
  team1-db: { <<: *team-db, container_name: team1-db }
  team1-proxy:
    build: ../team-stack/nginx
    container_name: team1-proxy
    ports: ["9100:80"]
    networks: [battle-net, management-net]
    volumes:
      - ./nginx-configs/team1.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
  team1-ide:
    build: ../team-stack/bot-ide
    container_name: team1-ide
    ports: ["8100:8080"]
    networks: [battle-net, management-net]
    environment:
      - TEAM_ID=1
      - TEAM_NAME=Team 1
      - ORCHESTRATOR_URL=http://orchestrator:9000
      - HACKATHON_SECRET=HACKATHON_SECRET_2025
      - MY_PROXY_PORT=9100
      - SERVER_IP=${SERVER_IP:-192.168.1.100}
    volumes:
      - team1-code:/app/workspace
    restart: unless-stopped

  team2-web: { <<: *team-web, container_name: team2-web }
  team2-api: { <<: *team-api, container_name: team2-api }
